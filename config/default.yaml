# Rust AI Gateway — Default Configuration
#
# This is the default configuration file for the AI Gateway.
# Environment variables can be referenced as ${VAR_NAME}.

server:
  host: "0.0.0.0"
  port: 8080
  workers: 4

providers:
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-4
      - gpt-3.5-turbo
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000

  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    models:
      - claude-sonnet-4-20250514
      - claude-3-5-sonnet-20241022
      - claude-3-haiku-20240307
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000

routing:
  default_provider: "openai"
  fallback_providers:
    - anthropic

cache:
  enabled: true
  ttl_seconds: 3600
  max_size: 10000

telemetry:
  enabled: false
  service_name: "ai-gateway"

metering:
  enabled: false
